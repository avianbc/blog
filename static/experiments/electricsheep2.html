<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Sheep - WebGL Fractal Flames</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="glCanvas"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec2 a_position;
        void main() {
            gl_Position = vec4(a_position, 0.0, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision highp float;

        uniform vec2 u_resolution;
        uniform float u_time;

        #define PI 3.14159265359
        #define TAU 6.28318530718
        #define ITERATIONS 80
        #define SYMMETRY 5.0

        // Smooth color palette - warm to cool gradient
        vec3 sheepPalette(float t) {
            // Slow color cycling
            t = fract(t);

            vec3 c1 = vec3(0.02, 0.01, 0.05);  // Deep purple-black
            vec3 c2 = vec3(0.4, 0.05, 0.2);    // Magenta
            vec3 c3 = vec3(0.9, 0.3, 0.1);     // Orange
            vec3 c4 = vec3(1.0, 0.9, 0.3);     // Yellow
            vec3 c5 = vec3(0.2, 0.8, 0.9);     // Cyan
            vec3 c6 = vec3(0.1, 0.2, 0.6);     // Blue

            float step = 1.0 / 5.0;

            if (t < step) return mix(c1, c2, t / step);
            else if (t < step * 2.0) return mix(c2, c3, (t - step) / step);
            else if (t < step * 3.0) return mix(c3, c4, (t - step * 2.0) / step);
            else if (t < step * 4.0) return mix(c4, c5, (t - step * 3.0) / step);
            else return mix(c5, c6, (t - step * 4.0) / step);
        }

        // Rotate point
        vec2 rotate(vec2 p, float a) {
            float c = cos(a);
            float s = sin(a);
            return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
        }

        // Fractal flame variations
        vec2 swirl(vec2 p) {
            float r2 = dot(p, p);
            float s = sin(r2);
            float c = cos(r2);
            return vec2(p.x * s - p.y * c, p.x * c + p.y * s);
        }

        vec2 spherical(vec2 p) {
            return p / (dot(p, p) + 0.001);
        }

        vec2 handkerchief(vec2 p) {
            float r = length(p);
            float theta = atan(p.y, p.x);
            return r * vec2(sin(theta + r), cos(theta - r));
        }

        vec2 spiral(vec2 p) {
            float r = length(p) + 0.001;
            float theta = atan(p.y, p.x);
            return vec2(cos(theta) + sin(r), sin(theta) - cos(r)) / r;
        }

        vec2 hyperbolic(vec2 p) {
            float r = length(p) + 0.001;
            float theta = atan(p.y, p.x);
            return vec2(sin(theta) / r, r * cos(theta));
        }

        vec2 diamond(vec2 p) {
            float r = length(p);
            float theta = atan(p.y, p.x);
            return vec2(sin(theta) * cos(r), cos(theta) * sin(r));
        }

        vec2 ex(vec2 p) {
            float r = length(p);
            float theta = atan(p.y, p.x);
            float p0 = sin(theta + r);
            float p1 = cos(theta - r);
            return r * vec2(p0*p0*p0 + p1*p1*p1, p0*p0*p0 - p1*p1*p1);
        }

        vec2 julia(vec2 p, float seed) {
            float r = sqrt(length(p));
            float theta = atan(p.y, p.x) * 0.5;
            float omega = seed > 0.5 ? PI : 0.0;
            return r * vec2(cos(theta + omega), sin(theta + omega));
        }

        vec2 bent(vec2 p) {
            vec2 result = p;
            if (p.x < 0.0) result.x *= 2.0;
            if (p.y < 0.0) result.y *= 0.5;
            return result;
        }

        vec2 fisheye(vec2 p) {
            float r = length(p);
            return 2.0 * p / (r + 1.0);
        }

        // Apply transform with symmetry
        vec2 applySymmetry(vec2 p, float n) {
            float angle = atan(p.y, p.x);
            float sector = TAU / n;
            angle = mod(angle + sector * 0.5, sector) - sector * 0.5;
            return length(p) * vec2(cos(angle), sin(angle));
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);

            // Slow time for smooth morphing
            float t = u_time * 0.08;

            // Accumulator for flame density and color
            vec3 color = vec3(0.0);
            float totalWeight = 0.0;

            // Starting point with slow drift
            vec2 p = uv * 1.8;

            // Apply rotational symmetry
            float symCount = floor(mod(t * 0.3, 4.0)) + 3.0;
            p = applySymmetry(p, symCount);

            // Morph weights between variations (very slow transitions)
            float w1 = sin(t * 0.5) * 0.5 + 0.5;
            float w2 = sin(t * 0.37 + 1.0) * 0.5 + 0.5;
            float w3 = sin(t * 0.29 + 2.0) * 0.5 + 0.5;
            float w4 = sin(t * 0.23 + 3.0) * 0.5 + 0.5;
            float w5 = sin(t * 0.19 + 4.0) * 0.5 + 0.5;

            // Normalize weights
            float wTotal = w1 + w2 + w3 + w4 + w5 + 0.001;
            w1 /= wTotal; w2 /= wTotal; w3 /= wTotal; w4 /= wTotal; w5 /= wTotal;

            // Affine transform parameters (slowly evolving)
            float scaleA = 0.7 + 0.15 * sin(t * 0.4);
            float scaleB = 0.65 + 0.15 * cos(t * 0.35);
            float rotA = t * 0.3;
            float rotB = -t * 0.25 + PI * 0.25;
            vec2 transA = vec2(sin(t * 0.2) * 0.3, cos(t * 0.17) * 0.3);
            vec2 transB = vec2(cos(t * 0.23) * 0.25, sin(t * 0.19) * 0.25);

            // Iterate the IFS
            vec2 z = p;

            for (int i = 0; i < ITERATIONS; i++) {
                float fi = float(i);
                float iterRatio = fi / float(ITERATIONS);

                // Choose transform based on position (deterministic chaos)
                float selector = fract(sin(dot(z, vec2(12.9898, 78.233)) + fi) * 43758.5453);

                vec2 zNew;
                float colorIndex;

                if (selector < 0.35) {
                    // Transform A: swirl + spherical blend
                    vec2 zSwirl = swirl(z * 1.5) * 0.7;
                    vec2 zSpher = spherical(z);
                    zNew = mix(zSwirl, zSpher, w1);
                    zNew = rotate(zNew, rotA) * scaleA + transA;
                    colorIndex = 0.1;
                } else if (selector < 0.6) {
                    // Transform B: spiral + handkerchief blend
                    vec2 zSpiral = spiral(z);
                    vec2 zHand = handkerchief(z * 0.8);
                    zNew = mix(zSpiral, zHand, w2);
                    zNew = rotate(zNew, rotB) * scaleB + transB;
                    colorIndex = 0.35;
                } else if (selector < 0.8) {
                    // Transform C: diamond + hyperbolic
                    vec2 zDiam = diamond(z);
                    vec2 zHyper = hyperbolic(z * 0.9);
                    zNew = mix(zDiam, zHyper, w3);
                    zNew = rotate(zNew, -rotA * 0.7) * scaleA * 0.95;
                    colorIndex = 0.6;
                } else {
                    // Transform D: julia + fisheye
                    float seed = fract(sin(t) * 43758.5453);
                    vec2 zJulia = julia(z, seed);
                    vec2 zFish = fisheye(z * 0.6);
                    zNew = mix(zJulia, zFish, w4);
                    zNew = rotate(zNew, rotB * 0.5) * scaleB * 1.1 + transA * 0.5;
                    colorIndex = 0.85;
                }

                z = zNew;

                // Skip first iterations (let the system settle)
                if (i < 15) continue;

                // Map z back to screen space for density accumulation
                vec2 screenPos = z;

                // Distance from current pixel to this point
                float dist = length(screenPos - uv);

                // Gaussian-like falloff for smooth rendering
                float radius = 0.015 + 0.01 * sin(t * 0.5);
                float weight = exp(-dist * dist / (2.0 * radius * radius));

                // Color based on iteration and transform
                float hue = colorIndex + iterRatio * 0.3 + t * 0.02;
                vec3 pointColor = sheepPalette(hue);

                // Accumulate with log density (prevents harsh spots)
                color += pointColor * weight;
                totalWeight += weight;
            }

            // Normalize and apply log density
            if (totalWeight > 0.0) {
                color = color / totalWeight;
                float density = log(1.0 + totalWeight * 50.0) * 0.3;
                color *= density;
            }

            // Gamma correction for smooth gradients
            color = pow(color, vec3(0.85));

            // Subtle glow effect
            float glow = length(color);
            color += color * glow * 0.3;

            // Soft vignette
            float vignette = 1.0 - smoothstep(0.5, 1.5, length(uv));
            color *= vignette;

            // Clamp and output
            color = clamp(color, 0.0, 1.0);

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        function initWebGL() {
            const canvas = document.getElementById('glCanvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

            if (!gl) {
                alert('WebGL not supported');
                return;
            }

            // Compile shader
            function compileShader(gl, source, type) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);

                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);
                    return null;
                }
                return shader;
            }

            // Create program
            const vertexSource = document.getElementById('vertexShader').textContent;
            const fragmentSource = document.getElementById('fragmentShader').textContent;

            const vertexShader = compileShader(gl, vertexSource, gl.VERTEX_SHADER);
            const fragmentShader = compileShader(gl, fragmentSource, gl.FRAGMENT_SHADER);

            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);

            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Program link error:', gl.getProgramInfoLog(program));
                return;
            }

            gl.useProgram(program);

            // Create fullscreen quad
            const positions = new Float32Array([
                -1, -1,
                 1, -1,
                -1,  1,
                 1,  1
            ]);

            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

            const positionLocation = gl.getAttribLocation(program, 'a_position');
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            // Get uniform locations
            const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
            const timeLocation = gl.getUniformLocation(program, 'u_time');

            // Resize handler
            function resize() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }

            window.addEventListener('resize', resize);
            resize();

            // Animation loop
            const startTime = performance.now();

            function render() {
                const time = (performance.now() - startTime) / 1000;

                gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
                gl.uniform1f(timeLocation, time);

                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                requestAnimationFrame(render);
            }

            render();
        }

        window.addEventListener('load', initWebGL);
    </script>
</body>

</html>
